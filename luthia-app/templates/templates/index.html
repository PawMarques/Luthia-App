{% extends 'base.html' %}
{% from 'macros/instrument_templates.html' import template_card %}

{% block extra_css %}
<link rel="stylesheet" href="/static/builds.css">
{% endblock %}

{% block content %}
<div class="builds-wrap">
  <div class="page-title-bar">
    <div class="page-title">Instrument Templates</div>
  </div>
  <div class="tpl-list">
    {% for t in templates %}
      {{ template_card(t) }}
    {% else %}
      <p style="color:#52525b;text-align:center;padding:40px 0;">No templates found.</p>
    {% endfor %}
  </div>
</div>
{% endblock %}
